name: Debian Test

on:
  workflow_dispatch:

jobs:
  debian-x86_64-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install QEMU
        run: sudo apt update && sudo apt install -y qemu-system-x86 ovmf qemu-utils cloud-image-utils openssh-client

      - name: VM Deploy - Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_qemu -N "" -q

      - name: VM Deploy - Download Debian cloud image
        run: |
          wget -q --show-progress -O /tmp/base.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

      - name: VM Deploy - Create cloud-init seed
        run: |
          cat > /tmp/user-data << 'EOF'
          #cloud-config
          users:
            - name: tester
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: true
              ssh_authorized_keys:
                - __KEY__
          EOF
          sed -i "s|__KEY__|$(cat ~/.ssh/id_qemu.pub)|" /tmp/user-data
          echo -e "instance-id: debian-x86_64\nlocal-hostname: debian-x86_64" > /tmp/meta-data
          cloud-localds /tmp/seed.img /tmp/user-data /tmp/meta-data

      - name: VM Deploy - Boot VM
        run: |
          cp /usr/share/OVMF/OVMF_VARS_4M.fd /tmp/OVMF_VARS.fd
          qemu-system-x86_64 \
            -m 2048 -smp 2 \
            -machine q35,accel=tcg \
            -drive if=pflash,format=raw,readonly=on,file=/usr/share/OVMF/OVMF_CODE_4M.fd \
            -drive if=pflash,format=raw,file=/tmp/OVMF_VARS.fd \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -drive file=/tmp/base.qcow2,format=qcow2,if=virtio \
            -drive file=/tmp/seed.img,format=raw,if=virtio \
            -display none \
            -serial file:/tmp/qemu-serial.log \
            -monitor none \
            &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"
          sleep 3
          if ! kill -0 $QEMU_PID 2>/dev/null; then
            echo "QEMU crashed at startup!"
            echo "=== Serial log ==="
            cat /tmp/qemu-serial.log 2>/dev/null || true
            exit 1
          fi

      - name: VM Deploy - Wait for SSH
        run: |
          for i in $(seq 1 90); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
              -p 2222 tester@localhost 'exit' 2>/dev/null && \
              echo "SSH ready ($((i*5))s)" && exit 0
            sleep 5
          done
          echo "=== SSH timeout - debugging ==="
          echo "--- QEMU process ---"
          pgrep -fa qemu || echo "QEMU not running!"
          echo "--- Serial console (last 80 lines) ---"
          tail -80 /tmp/qemu-serial.log 2>/dev/null || echo "No serial log"
          echo "--- Port 2222 ---"
          ss -tlnp | grep 2222 || echo "Port 2222 not listening"
          exit 1

      - name: VM Deploy - Show system info
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'echo "System: $(. /etc/os-release && echo $NAME $VERSION)" && echo "Architecture: $(uname -m)"'

      - name: Check docker command
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'if command -v docker >/dev/null 2>&1; then
               echo "docker found: $(command -v docker)"
               docker --version
             else
               echo "docker NOT found"
             fi'

      - name: Install prerequisites
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'sudo apt update && sudo apt install -y curl gpg apt-transport-https ca-certificates'

      - name: Install via install script
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh'

      - name: docker ps (after install)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: devstar start
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            '. ~/.profile && sudo env "PATH=$PATH" devstar start'

      - name: docker ps (after start)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: Shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
            -p 2222 tester@localhost 'sudo poweroff' 2>/dev/null || true

  debian-arm64-qemu:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - name: Install QEMU
        run: sudo apt update && sudo apt install -y qemu-system-arm qemu-efi-aarch64 qemu-utils cloud-image-utils openssh-client

      - name: VM Deploy - Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_qemu -N "" -q

      - name: VM Deploy - Download Debian cloud image
        run: |
          wget -q --show-progress -O /tmp/base.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-arm64.qcow2

      - name: VM Deploy - Create cloud-init seed
        run: |
          cat > /tmp/user-data << 'EOF'
          #cloud-config
          users:
            - name: tester
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: true
              ssh_authorized_keys:
                - __KEY__
          # 同时设置 root 密码，以便通过串口登录调试
          ssh_pwauth: true
          chpasswd:
            list: |
              root:root
            expire: false
          EOF
          sed -i "s|__KEY__|$(cat ~/.ssh/id_qemu.pub)|" /tmp/user-data
          echo -e "instance-id: debian-arm64\nlocal-hostname: debian-arm64" > /tmp/meta-data
          cloud-localds /tmp/seed.img /tmp/user-data /tmp/meta-data

      - name: VM Deploy - Extract kernel from cloud image
        run: |
          echo "=== Attempting to extract kernel/initrd from qcow2 ==="
          # 方法1: 尝试从 Debian cloud 镜像站直接下载内核文件
          BASE_URL="https://cloud.debian.org/images/cloud/bookworm/latest"
          wget -q --spider "$BASE_URL/debian-12-genericcloud-arm64.vmlinuz" 2>/dev/null && \
            wget -q "$BASE_URL/debian-12-genericcloud-arm64.vmlinuz" -O /tmp/vmlinuz && \
            wget -q "$BASE_URL/debian-12-genericcloud-arm64.initrd" -O /tmp/initrd && \
            echo "Downloaded kernel/initrd directly!" || \
            echo "No separate kernel files at download URL"

          # 方法2: 如果直接下载失败，通过 losetup 从 qcow2 提取
          if [ ! -s /tmp/vmlinuz ] || [ ! -s /tmp/initrd ]; then
            echo "=== Extracting from qcow2 via raw conversion ==="
            qemu-img convert -O raw /tmp/base.qcow2 /tmp/base.raw
            echo "Raw image created ($(ls -lh /tmp/base.raw | awk '{print $5}'))"
            sudo losetup -P /dev/loop0 /tmp/base.raw
            sleep 2
            echo "=== Partition layout ==="
            sudo fdisk -l /dev/loop0 || sudo blkid /dev/loop0* || true
            ROOT_PART=""
            ROOT_IDX=""
            for idx in 1 2 3 4; do
              PART=/dev/loop0p$idx
              [ -b "$PART" ] || continue
              echo "Trying $PART..."
              if sudo mount -o ro $PART /mnt 2>/dev/null; then
                echo "Mounted $PART, checking for kernel..."
                ls /mnt/boot/ 2>/dev/null || true
                KERNEL=$(sudo find /mnt -maxdepth 3 -name "vmlinuz-*" -type f 2>/dev/null | head -1)
                [ -z "$KERNEL" ] && KERNEL=$(sudo find /mnt -maxdepth 3 -name "vmlinuz" -type f 2>/dev/null | head -1)
                if [ -n "$KERNEL" ]; then
                  ROOT_PART=$PART
                  ROOT_IDX=$idx
                  echo "Found kernel: $KERNEL"
                  sudo cp -L "$KERNEL" /tmp/vmlinuz
                  sudo chmod 644 /tmp/vmlinuz
                  INITRD=$(sudo find /mnt -maxdepth 3 -name "initrd.img-*" -type f 2>/dev/null | head -1)
                  [ -z "$INITRD" ] && INITRD=$(sudo find /mnt -maxdepth 3 -name "initrd.img" -type f 2>/dev/null | head -1)
                  if [ -n "$INITRD" ]; then
                    sudo cp -L "$INITRD" /tmp/initrd
                    sudo chmod 644 /tmp/initrd
                  fi
                  # 提取根分区 UUID/LABEL
                  ROOT_UUID=$(sudo blkid -s UUID -o value $PART 2>/dev/null || echo "")
                  ROOT_LABEL=$(sudo blkid -s LABEL -o value $PART 2>/dev/null || echo "")
                  echo "Root UUID: $ROOT_UUID"
                  echo "Root LABEL: $ROOT_LABEL"
                  # 提取 GRUB 内核命令行
                  for cfg in /mnt/boot/grub/grub.cfg /mnt/boot/efi/EFI/debian/grub.cfg; do
                    if [ -f "$cfg" ]; then
                      CMDLINE=$(sudo grep "linux" "$cfg" | head -1 | sed 's/.*linux\s\+\/vmlinuz[^ ]*\s*//' || true)
                      [ -n "$CMDLINE" ] && echo "GRUB cmdline: $CMDLINE" && break
                    fi
                  done
                  sudo umount /mnt
                  break
                fi
                sudo umount /mnt
              fi
            done
            sudo losetup -d /dev/loop0
            rm -f /tmp/base.raw
            [ -z "$ROOT_PART" ] && echo "ERROR: Could not find root partition!" && exit 1
          fi

          [ ! -f /tmp/vmlinuz ] && echo "ERROR: Kernel not extracted!" && exit 1
          [ ! -f /tmp/initrd ] && echo "ERROR: Initrd not extracted!" && exit 1
          echo "ROOT_IDX=$ROOT_IDX" > /tmp/boot-config.env
          echo "ROOT_UUID=$ROOT_UUID" >> /tmp/boot-config.env
          echo "ROOT_LABEL=$ROOT_LABEL" >> /tmp/boot-config.env
          echo "CMDLINE=${CMDLINE:-}" >> /tmp/boot-config.env
          echo "Kernel: $(ls -lh /tmp/vmlinuz | awk '{print $5}')"
          echo "Initrd: $(ls -lh /tmp/initrd | awk '{print $5}')"
          echo "Root partition index: $ROOT_IDX"
          echo "Boot config saved to /tmp/boot-config.env"

      - name: VM Deploy - Boot VM
        run: |
          source /tmp/boot-config.env

          # 检测 KVM 可用性
          if [ -e /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            ACCEL="kvm"
            echo "KVM available, using hardware acceleration"
          else
            ACCEL="tcg"
            echo "KVM not available, using TCG (software emulation)"
          fi

          # 构建内核命令行：优先使用 GRUB 中的原始参数，否则用 fallback
          if [ -n "$CMDLINE" ]; then
            # 使用 GRUB 原始命令行，追加 cloud-init nocloud 数据源
            APPEND="$CMDLINE ds=nocloud"
          elif [ -n "$ROOT_LABEL" ]; then
            APPEND="console=ttyAMA0 root=LABEL=$ROOT_LABEL ro ds=nocloud"
          elif [ -n "$ROOT_UUID" ]; then
            APPEND="console=ttyAMA0 root=UUID=$ROOT_UUID ro ds=nocloud"
          else
            APPEND="console=ttyAMA0 root=/dev/vda${ROOT_IDX:-1} ro ds=nocloud"
          fi
          echo "Kernel cmdline: $APPEND"

          # 直接引导内核
          qemu-system-aarch64 \
            -m 2048 -smp 2 \
            -machine virt,accel=$ACCEL,gic-version=3 \
            -cpu max \
            -kernel /tmp/vmlinuz \
            -initrd /tmp/initrd \
            -append "$APPEND" \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -drive file=/tmp/base.qcow2,format=qcow2,if=virtio \
            -drive file=/tmp/seed.img,format=raw,if=virtio \
            -nographic \
            -serial file:/tmp/qemu-serial.log \
            &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"
          sleep 10
          if ! kill -0 $QEMU_PID 2>/dev/null; then
            echo "QEMU crashed at startup!"
            echo "=== Serial log ==="
            cat /tmp/qemu-serial.log 2>/dev/null || true
            exit 1
          fi
          echo "=== Serial log size: $(wc -l < /tmp/qemu-serial.log 2>/dev/null || echo 0) lines ==="
          echo "=== Serial console (all content) ==="
          cat /tmp/qemu-serial.log 2>/dev/null || echo "(empty)"

      - name: VM Deploy - Wait for SSH
        run: |
          for i in $(seq 1 150); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
              -p 2222 tester@localhost 'exit' 2>/dev/null && \
              echo "SSH ready ($((i*5))s)" && exit 0
            # 每 30 次打印一次进度
            if [ $((i % 30)) -eq 0 ]; then
              echo "  Still waiting... ($((i*5))s elapsed)"
              echo "  Serial tail:"
              tail -5 /tmp/qemu-serial.log 2>/dev/null | sed 's/^/    /' || true
            fi
            sleep 5
          done
          echo "=== SSH timeout - debugging ==="
          echo "--- QEMU process ---"
          pgrep -fa qemu || echo "QEMU not running!"
          echo "--- Serial console (last 80 lines) ---"
          tail -80 /tmp/qemu-serial.log 2>/dev/null || echo "No serial log"
          echo "--- Port 2222 ---"
          ss -tlnp | grep 2222 || echo "Port 2222 not listening"
          exit 1

      - name: VM Deploy - Show system info
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'echo "System: $(. /etc/os-release && echo $NAME $VERSION)" && echo "Architecture: $(uname -m)"'

      - name: Check docker command
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'if command -v docker >/dev/null 2>&1; then
               echo "docker found: $(command -v docker)"
               docker --version
             else
               echo "docker NOT found"
             fi'

      - name: Install prerequisites
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'sudo apt update && sudo apt install -y curl gpg apt-transport-https ca-certificates'

      - name: Install via install script
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh'

      - name: docker ps (after install)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: devstar start
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            '. ~/.profile && sudo env "PATH=$PATH" devstar start'

      - name: docker ps (after start)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: Shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
            -p 2222 tester@localhost 'sudo poweroff' 2>/dev/null || true
