name: Debian nspawn Devstar Test

on:
  workflow_dispatch:

jobs:
  debian-x86:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y systemd-container debootstrap curl

      - name: Create Debian rootfs
        run: |
          sudo mkdir -p /var/lib/machines/debian

          sudo debootstrap stable /var/lib/machines/debian http://deb.debian.org/debian

      - name: Start Debian with systemd
        run: |
          sudo systemd-nspawn \
            -D /var/lib/machines/debian \
            --boot \
            --machine=debian \
            --quiet &

          sleep 15

      # ================= STEP 1 =================
      - name: Step 1 - docker ps
        run: |
          sudo systemd-nspawn -M debian --quiet /bin/bash -c "docker ps || true"

      # ================= STEP 2 =================
      - name: Step 2 - install devstar
        run: |
          sudo systemd-nspawn -M debian --quiet /bin/bash -c "
            curl -fsSL https://devstar.cn/install -o install.sh &&
            bash install.sh
          "

      # ================= STEP 3 =================
      - name: Step 3 - devstar start
        run: |
          sudo systemd-nspawn -M debian --quiet /bin/bash -c "
            devstar start
          "

      # ================= STEP 4 =================
      - name: Step 4 - docker ps again
        run: |
          sudo systemd-nspawn -M debian --quiet /bin/bash -c "docker ps || true"