name: Debian nspawn Test

on:
  workflow_dispatch:

jobs:
  debian-x86:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap systemd-container dbus

      - name: Create Debian rootfs
        run: |
          # 包含基础网络、D-Bus 和内核管理组件
          sudo debootstrap --include=dbus,curl,ca-certificates,systemd,procps bookworm /var/lib/machines/debian-test

      - name: Boot Debian nspawn container
        run: |
          # 【终极核心修改】
          # 1. 使用 --quiet 减少 CI 终端抢占
          # 2. 使用 --ephemeral=no 确保容器不被作为临时镜像销毁
          # 3. 输入重定向自 /dev/null 阻止后台进程因 stdin 丢失而暴毙
          sudo systemd-nspawn -D /var/lib/machines/debian-test \
            --boot \
            --machine debian-test \
            --network-veth \
            --cap-add=CAP_SYS_ADMIN \
            --system-call-filter="allow" \
            --quiet < /dev/null &

          echo "Waiting for container and its System Bus to come online..."
          SUCCESS=0
          for i in $(seq 1 30); do
            # 优先检查进程是否还活着
            if sudo machinectl list 2>&1 | grep -q "debian-test"; then
              # 尝试通信探针
              if sudo machinectl shell debian-test /bin/true >/dev/null 2>&1; then
                echo "Container and System Bus are fully ready!"
                SUCCESS=1
                break
              fi
            else
              echo "Warning: Container process missing from machine list, retrying... ($i/30)"
            fi
            sleep 2
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "Error: Container failed to boot or hosted a system bus."
            echo "=== SHOWING HOST JOURNAL LOGS FOR DEBIAN-TEST ==="
            # 打印宿主机的系统日志，用来抓取容器到底因为什么崩溃了
            sudo journalctl -u systemd-nspawn@debian-test --no-pager -n 50 || true
            sudo journalctl --failed --no-pager || true
            exit 1
          fi

      - name: Run installer
        run: |
          sudo machinectl shell debian-test /bin/bash -c "curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh"

      - name: Verify docker after install
        run: |
          sudo machinectl shell debian-test docker ps

      - name: Stop container
        if: always()
        run: |
          sudo machinectl poweroff debian-test || true