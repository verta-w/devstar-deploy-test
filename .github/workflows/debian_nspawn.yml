name: Debian nspawn Test

on:
  workflow_dispatch:

jobs:
  debian-x86:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap systemd-container dbus

      - name: Create Debian rootfs
        run: |
          # 确保包含 systemd 完整套件
          sudo debootstrap --include=dbus,curl,ca-certificates,systemd,procps,iptables bookworm /var/lib/machines/debian-test

      - name: Boot Debian nspawn container
        run: |
          # 【核心修改 1】：使用 systemd-run 把容器提权为宿主机的系统服务，彻底防止后台闪退
          sudo systemd-run --unit=nspawn-debian-test \
            systemd-nspawn -D /var/lib/machines/debian-test \
            --boot \
            --machine debian-test \
            --network-veth \
            --cap-add=CAP_SYS_ADMIN \
            --system-call-filter="allow"

          echo "Waiting for container and its System Bus to come online..."
          SUCCESS=0
          for i in $(seq 1 30); do
            # 检查 machinectl 里的注册状态
            if sudo machinectl list 2>&1 | grep -q "debian-test"; then
              # 通过总线连接探针
              if sudo machinectl shell debian-test /bin/true >/dev/null 2>&1; then
                echo "Container and System Bus are fully ready!"
                SUCCESS=1
                break
              fi
            fi
            echo "Still booting, waiting for D-Bus... ($i/30)"
            sleep 2
          done

          if [ $SUCCESS -ne 1 ]; then
            echo "Error: Container failed to boot or hosted a system bus."
            echo "=== SHOWING CONTAINER BOOTING LOGS ==="
            # 【核心修改 2】：此时可以通过我们的单元名称拿到完整的开机崩溃日志
            sudo journalctl -u nspawn-debian-test --no-pager -n 100 || true
            exit 1
          fi

      - name: Run installer
        run: |
          sudo machinectl shell debian-test /bin/bash -c "curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh"

      - name: Verify docker after install
        run: |
          sudo machinectl shell debian-test docker ps

      - name: Stop container
        if: always()
        run: |
          sudo machinectl poweroff debian-test || sudo systemctl stop nspawn-debian-test || true