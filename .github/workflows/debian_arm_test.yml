name: Deploy Debian ARM on Ubuntu ARM via QEMU

on:
  workflow_dispatch:

jobs:
  qemu-debian-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils qemu-efi-aarch64 sshpass wget cloud-image-utils

      - name: Download Debian ARM64 qcow2 Image
        run: |
          wget -q https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2 -O debian.qcow2
          
          # 使用更直接的 runcmd 来暴力重置密码并配置 SSHD
          cat << 'EOF' > user-data
          #cloud-config
          ssh_pwauth: true
          
          # 直接使用系统的标准 shell 命令确保 debian 和 root 的密码百分之百被修改
          runcmd:
            - echo "debian:mysecurepassword" | chpasswd
            - echo "root:mysecurepassword" | chpasswd
            - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
            - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config
            - systemctl restart sshd
          EOF
          
          cloud-localds seed.img user-data

      - name: Start Debian in QEMU
        run: |
          qemu-system-aarch64 \
            -machine virt \
            -cpu max \
            -smp 2 \
            -m 2048 \
            -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
            -drive if=virtio,file=debian.qcow2,format=qcow2 \
            -drive if=virtio,file=seed.img,format=raw \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::2222-:22 \
            -display none \
            -daemonize

      - name: Wait and Verify SSH Connection
        run: |
          echo "=== [1/2] Current Github Actions Host Info ==="
          echo "Host Hostname: $(hostname)"
          echo "Host Architecture: $(uname -m)"
          
          echo -e "\n=== [2/2] Attempting to log into QEMU Debian VM ==="
          
          # TCG 模拟运行 cloud-init 脚本需要时间，把等待上限提升到 5 分钟 (30 * 10秒)
          SUCCESS=false
          for i in {1..30}; do
            echo "Attempting SSH connection (Try $i/30)..."
          
            # 这里先尝试 root 登录（如果 debian 用户还没初始化完，root 通常已经就绪）
            if sshpass -p "mysecurepassword" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -p 2222 root@localhost \
              "echo '--- Inside Debian VM ---' && uname -a && cat /etc/os-release | grep PRETTY_NAME && arch"; then
              SUCCESS=true
              break
            fi
            echo "SSH not ready yet or permission denied, sleeping 10 seconds..."
            sleep 10
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to connect to Debian VM via SSH after 5 minutes."
            exit 1
          fi