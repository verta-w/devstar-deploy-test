name: Deploy Debian ARM on Ubuntu ARM via QEMU

on:
  workflow_dispatch:

jobs:
  qemu-debian-arm:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils qemu-efi-aarch64 sshpass wget cloud-image-utils

      - name: Download Debian ARM64 qcow2 Image
        run: |
          wget -q https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2 -O debian.qcow2
          
          # 明确指定创建 debian 用户，并赋予 sudo 权限，开启密码登录
          cat << 'EOF' > user-data
          #cloud-config
          users:
            - name: debian
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: false
              passwd: "$6$rounds=4096$activesalt$Z/S9Wp1b3z339hWnZtO1G4z4Y1D3B/M6BdBbXg1mN7." # 对应明文: mysecurepassword
          ssh_pwauth: True
          chpasswd: { expire: False }
          EOF
          
          cloud-localds seed.img user-data

      - name: Start Debian in QEMU
        run: |
          qemu-system-aarch64 \
            -machine virt \
            -cpu max \
            -smp 2 \
            -m 2048 \
            -bios /usr/share/qemu-efi-aarch64/QEMU_EFI.fd \
            -drive if=virtio,file=debian.qcow2,format=qcow2 \
            -drive if=virtio,file=seed.img,format=raw \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::2222-:22 \
            -display none \
            -daemonize

      - name: Wait and Verify SSH Connection
        run: |
          echo "=== [1/2] Current Github Actions Host Info ==="
          echo "Host Hostname: $(hostname)"
          echo "Host Architecture: $(uname -m)"
          
          echo -e "\n=== [2/2] Attempting to log into QEMU Debian VM ==="
          
          # 循环重试 SSH 登录，最多等待 3 分钟 (18 * 10秒)
          # 这样即使中间出现 Connection reset，也会自动重试直到内部系统彻底就绪
          SUCCESS=false
          for i in {1..18}; do
            echo "Attempting SSH connection (Try $i/18)..."
            if sshpass -p "mysecurepassword" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 -p 2222 debian@localhost \
              "echo '--- Inside Debian VM ---' && uname -a && cat /etc/os-release | grep PRETTY_NAME && arch"; then
              SUCCESS=true
              break
            fi
            echo "SSH not ready yet, sleeping 10 seconds..."
            sleep 10
          done

          if [ "$SUCCESS" = false ]; then
            echo "Failed to connect to Debian VM via SSH after 3 minutes."
            exit 1
          fi