name: Deploy Debian ARM on Ubuntu ARM via QEMU

on:
  workflow_dispatch:

jobs:
  qemu-debian-arm:
    # 使用 GitHub 提供的原生 ARM64 执行器
    runs-on: ubuntu-latest-arm

    steps:
      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils u-boot-qemu sshpass wget

      - name: Download Debian ARM64 qcow2 Image
        run: |
          # 下载 Debian 12 (Bookworm) 官方云镜像
          wget -q https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-generic-arm64.qcow2 -O debian.qcow2
          
          # 创建一个 cloud-init 配置，用于配置默认密码并开启 SSH 登录
          cat << 'EOF' > user-data
          #cloud-config
          password: mysecurepassword
          chpasswd: { expire: False }
          ssh_pwauth: True
          EOF
          
          # 生成 seed.img 并将其挂载为 cloud-init 数据源
          sudo apt-get install -y cloud-image-utils
          cloud-localds seed.img user-data

      - name: Start Debian in QEMU
        run: |
          # 后台启动 QEMU 虚拟机
          # 将虚拟机的 22 端口映射到宿主机的 2222 端口
          qemu-system-aarch64 \
            -machine virt \
            -cpu host \
            -enable-kvm \
            -smp 2 \
            -m 2048 \
            -bios /usr/share/qemu/qemu-uefi-aarch64.bin \
            -drive if=virtio,file=debian.qcow2,format=qcow2 \
            -drive if=virtio,file=seed.img,format=raw \
            -net nic,model=virtio \
            -net user,hostfwd=tcp::2222-:22 \
            -nographic \
            -daemonize

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for Debian VM to boot and SSH to start..."
          # 循环检测 2222 端口是否开放
          for i in {1..30}; do
            if nc -z localhost 2222; then
              echo "SSH port is open!"
              sleep 5 # 给 SSH 进程一点初始化时间
              break
            fi
            echo "Retrying in 5 seconds ($i/30)..."
            sleep 5
          done

      - name: Verify Host and Guest Architecture
        run: |
          echo "=== [1/2] Current Github Actions Host Info ==="
          echo "Host Hostname: $(hostname)"
          echo "Host Architecture: $(uname -m)"
          
          echo -e "\n=== [2/2] Logging into QEMU Debian VM ==="
          # 使用 sshpass 配合刚才 cloud-init 设置的密码登录虚拟机
          # 默认用户一般为 debian
          sshpass -p "mysecurepassword" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p 2222 debian@localhost \
            "echo '--- Inside Debian VM ---' && uname -a && cat /etc/os-release | grep PRETTY_NAME && arch"