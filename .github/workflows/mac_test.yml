name: Mac Test

on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Show system info
        run: |
          echo "System: $(sw_vers -productName) $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"

      - name: Setup Docker via Colima (QEMU backend)
        timeout-minutes: 15
        run: |
          if command -v docker &>/dev/null && docker info &>/dev/null; then
            echo "Docker already available, skipping setup"
            exit 0
          fi

          echo "=== Installing colima and qemu ==="
          brew install qemu colima

          echo "=== Starting colima with QEMU backend ==="
          # QEMU 是纯软件模拟，不需要嵌套虚拟化支持，可以在 macOS VM runner 里运行
          colima start --vm-type qemu --cpu 2 --memory 4 --disk 30

          echo "=== Docker info ==="
          docker info
          docker --version

      - name: Install via install script
        run: curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh

      - name: docker ps (after install)
        run: docker ps

      - name: devstar start
        shell: bash --login {0}
        run: sudo env "PATH=$PATH" devstar start

      - name: docker ps (after start)
        run: docker ps
