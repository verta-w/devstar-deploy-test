name: LXD Debian Test Fixed

on:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        include:
          - name: x86
            runs-on: ubuntu-24.04
          - name: arm
            runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd init --auto
          # 禁用 lxdbr0 IPv6 + 强制 DNS，避免 GitHub Actions 嵌套 NAT 下网络不通
          sudo lxc network set lxdbr0 ipv6.address none
          sudo lxc network set lxdbr0 dns.nameservers=8.8.8.8
          sudo lxc network set lxdbr0 dns.mode=none
          # 确保内核允许 iptables NAT（LXD 容器出网依赖）
          sudo iptables -t nat -C POSTROUTING -s 10.0.0.0/8 -j MASQUERADE 2>/dev/null || \
            sudo iptables -t nat -A POSTROUTING -s 10.0.0.0/8 -j MASQUERADE
          # 允许 lxdbr0 的转发流量
          sudo iptables -I FORWARD -i lxdbr0 -j ACCEPT 2>/dev/null || true

      - name: Verify LXD
        run: |
          sudo lxc version
          sudo lxc network list

      - name: Launch Debian container
        run: |
          sudo lxc launch images:debian/12 debian-${{ matrix.name }}

      - name: Wait for container
        run: |
          sleep 10

      - name: Configure container network
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            # 停止 systemd-resolved 防止覆盖 /etc/resolv.conf
            systemctl stop systemd-resolved || true
            systemctl disable systemd-resolved || true
            rm -f /etc/resolv.conf
            echo "nameserver 8.8.8.8" > /etc/resolv.conf
            echo "nameserver 8.8.4.4" >> /etc/resolv.conf

            # 禁用 IPv6 避免双栈 fallback 超时
            sysctl -w net.ipv6.conf.all.disable_ipv6=1
            sysctl -w net.ipv6.conf.default.disable_ipv6=1
          '

      - name: Test container network
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            echo "=== DNS test ==="
            nslookup deb.debian.org 2>&1 || dig deb.debian.org 2>&1 || getent hosts deb.debian.org || echo "DNS failed"
            echo
            echo "=== Ping test ==="
            ping -c 2 -W 3 8.8.8.8 2>&1 || echo "ping 8.8.8.8 failed"
            echo
            echo "=== HTTP test ==="
            curl -v --connect-timeout 5 http://deb.debian.org 2>&1 | head -20 || echo "HTTP to deb.debian.org failed"
            echo
            echo "=== DNS config ==="
            cat /etc/resolv.conf
            echo
            echo "=== sysctl ipv6 ==="
            sysctl net.ipv6.conf.all.disable_ipv6 2>&1 || echo "sysctl failed"
          '

      - name: Run command inside Debian
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c "
            echo '===== ARCH ====='
            uname -m
            echo
            echo '===== OS ====='
            cat /etc/os-release
          "

      - name: Install curl in Debian
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            apt-get update &&
            apt-get install -y curl
          '

      # -------------------------
      # Docker check
      # -------------------------
      - name: Check Docker exists
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            if command -v docker >/dev/null 2>&1; then
              echo "docker found: $(command -v docker)"
              docker --version
            else
              echo "docker NOT found"
            fi
          '

      # -------------------------
      # Install script
      # -------------------------
      - name: Run install script
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            curl -fsSL https://devstar.cn/install -o install.sh &&
            bash install.sh
          '

      # -------------------------
      # Docker ps after install
      # -------------------------
      - name: Docker ps after install
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            docker ps
          '

      # -------------------------
      # Start service
      # -------------------------
      - name: Start devstar service
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            devstar start
          '

      # -------------------------
      # Final docker check
      # -------------------------
      - name: Final docker ps
        run: |
          sudo lxc exec debian-${{ matrix.name }} -- bash -c '
            docker ps
          '

      - name: Cleanup
        if: always()
        run: |
          sudo lxc delete debian-${{ matrix.name }} --force || true