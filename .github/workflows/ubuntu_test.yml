name: Ubuntu Test

on:
  workflow_dispatch:

jobs:
  ubuntu-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Show system info
        run: |
          echo "System: $(. /etc/os-release && echo $NAME $VERSION)"
          echo "Architecture: $(uname -m)"

      - name: Check docker command
        run: |
          if command -v docker &>/dev/null; then
            echo "docker found: $(which docker)"
            docker --version
          else
            echo "docker NOT found"
          fi

      - name: Install via install script
        run: curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh

      - name: docker ps (after install)
        run: docker ps

      - name: devstar start
        shell: bash --login {0}
        run: sudo env "PATH=$PATH" devstar start

      - name: docker ps (after start)
        run: docker ps

  ubuntu-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Show system info
        run: |
          echo "System: $(. /etc/os-release && echo $NAME $VERSION)"
          echo "Architecture: $(uname -m)"

      - name: Check docker command
        run: |
          if command -v docker &>/dev/null; then
            echo "docker found: $(which docker)"
            docker --version
          else
            echo "docker NOT found"
          fi

      - name: Install via install script
        run: curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh

      - name: docker ps (after install)
        run: docker ps

      - name: devstar start
        shell: bash --login {0}
        run: sudo env "PATH=$PATH" devstar start

      - name: docker ps (after start)
        run: docker ps
