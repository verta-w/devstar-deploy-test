name: env_test

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  ubuntu-x86_64:
    runs-on: ubuntu-latest
    steps:
      - name: Show system info
        run: |
          echo "System: $(. /etc/os-release && echo $NAME $VERSION)"
          echo "Architecture: $(uname -m)"

  ubuntu-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Show system info
        run: |
          echo "System: $(. /etc/os-release && echo $NAME $VERSION)"
          echo "Architecture: $(uname -m)"
