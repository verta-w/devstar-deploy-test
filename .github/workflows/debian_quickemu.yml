name: Debian Quickemu Test

on:
  workflow_dispatch:

jobs:
  # ─── x86_64 ───────────────────────────────────────────────────────
  debian-x86_64-quickemu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install quickemu and dependencies
        run: |
          sudo apt-add-repository -y ppa:flexiondotorg/quickemu
          sudo apt update
          sudo apt install -y quickemu qemu-utils cloud-image-utils openssh-client

      - name: VM Deploy - Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_qemu -N "" -q

      - name: VM Deploy - Download Debian cloud image
        run: |
          wget -q --show-progress -O /tmp/base.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

      - name: VM Deploy - Create cloud-init seed
        run: |
          cat > /tmp/user-data << 'EOF'
          #cloud-config
          users:
            - name: tester
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: true
              ssh_authorized_keys:
                - __KEY__
          EOF
          sed -i "s|__KEY__|$(cat ~/.ssh/id_qemu.pub)|" /tmp/user-data
          echo -e "instance-id: debian-x86_64\nlocal-hostname: debian-x86_64" > /tmp/meta-data
          cloud-localds /tmp/seed.img /tmp/user-data /tmp/meta-data

      - name: VM Deploy - Boot VM with quickemu
        run: |
          cat > /tmp/debian.conf << 'QFEOF'
          guest_os="linux"
          disk_img="/tmp/base.qcow2"
          fixed_iso="/tmp/seed.img"
          port_forwards=("2222:22")
          delete_disk="false"
          QFEOF

          echo "=== quickemu config ==="
          cat /tmp/debian.conf

          # 一行替代原来 15 行 qemu-system-* 参数
          quickemu --vm /tmp/debian.conf --display none &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          sleep 5
          if ! pgrep -f qemu-system > /dev/null; then
            echo "VM crashed at startup!"
            echo "=== VM log ==="
            cat /tmp/debian/debian.log 2>/dev/null || true
            exit 1
          fi

      - name: VM Deploy - Wait for SSH
        run: |
          for i in $(seq 1 90); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
              -p 2222 tester@localhost 'exit' 2>/dev/null && \
              echo "SSH ready ($((i*5))s)" && exit 0
            sleep 5
          done
          echo "=== SSH timeout - debugging ==="
          pgrep -fa qemu || echo "QEMU not running!"
          echo "=== VM log (last 80 lines) ==="
          tail -80 /tmp/debian/debian.log 2>/dev/null || echo "No VM log"
          echo "=== Port 2222 ==="
          ss -tlnp | grep 2222 || echo "Port 2222 not listening"
          exit 1

      - name: VM Deploy - Show system info
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'echo "System: $(. /etc/os-release && echo $NAME $VERSION)" && echo "Architecture: $(uname -m)"'

      - name: Check docker command
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'if command -v docker >/dev/null 2>&1; then
               echo "docker found: $(command -v docker)"
               docker --version
             else
               echo "docker NOT found"
             fi'

      - name: Install prerequisites
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'sudo apt update && sudo apt install -y curl gpg apt-transport-https ca-certificates'

      - name: Install via install script
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh'

      - name: docker ps (after install)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: devstar start
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            '. ~/.profile && sudo env "PATH=$PATH" devstar start'

      - name: docker ps (after start)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: Shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
            -p 2222 tester@localhost 'sudo poweroff' 2>/dev/null || true

  # ─── ARM64 ───────────────────────────────────────────────────────
  debian-arm64-quickemu:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 25
    steps:
      - name: Install quickemu and dependencies
        run: |
          # PPA 可能不含 arm64 包，失败时从 GitHub 源码安装
          if ! sudo apt-add-repository -y ppa:flexiondotorg/quickemu 2>/dev/null; then
            echo "PPA unavailable, installing from source..."
            git clone --depth=1 https://github.com/quickemu-project/quickemu.git
            sudo make -C quickemu install
          else
            sudo apt update
            sudo apt install -y quickemu || {
              echo "quickemu package not found, installing from source..."
              git clone --depth=1 https://github.com/quickemu-project/quickemu.git
              sudo make -C quickemu install
            }
          fi
          sudo apt install -y qemu-system-arm qemu-efi-aarch64 qemu-utils cloud-image-utils openssh-client

      - name: VM Deploy - Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_qemu -N "" -q

      - name: VM Deploy - Download Debian cloud image
        run: |
          wget -q --show-progress -O /tmp/base.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-arm64.qcow2

      - name: VM Deploy - Create cloud-init seed
        run: |
          cat > /tmp/user-data << 'EOF'
          #cloud-config
          users:
            - name: tester
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: true
              ssh_authorized_keys:
                - __KEY__
          EOF
          sed -i "s|__KEY__|$(cat ~/.ssh/id_qemu.pub)|" /tmp/user-data
          echo -e "instance-id: debian-arm64\nlocal-hostname: debian-arm64" > /tmp/meta-data
          cloud-localds /tmp/seed.img /tmp/user-data /tmp/meta-data

      - name: VM Deploy - Boot VM with quickemu
        run: |
          cat > /tmp/debian.conf << 'QFEOF'
          guest_os="linux"
          disk_img="/tmp/base.qcow2"
          fixed_iso="/tmp/seed.img"
          port_forwards=("2222:22")
          delete_disk="false"
          QFEOF

          echo "=== quickemu config ==="
          cat /tmp/debian.conf

          quickemu --vm /tmp/debian.conf --display none &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          sleep 5
          if ! pgrep -f qemu-system > /dev/null; then
            echo "VM crashed at startup!"
            echo "=== VM log ==="
            cat /tmp/debian/debian.log 2>/dev/null || true
            exit 1
          fi
          echo "=== VM log (first 20 lines) ==="
          head -20 /tmp/debian/debian.log 2>/dev/null || true

      - name: VM Deploy - Wait for SSH
        run: |
          for i in $(seq 1 150); do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
              -p 2222 tester@localhost 'exit' 2>/dev/null && \
              echo "SSH ready ($((i*5))s)" && exit 0
            if [ $((i % 30)) -eq 0 ]; then
              echo "  Still waiting... ($((i*5))s elapsed)"
              echo "  VM log tail:"
              tail -5 /tmp/debian/debian.log 2>/dev/null | sed 's/^/    /' || true
            fi
            sleep 5
          done
          echo "=== SSH timeout - debugging ==="
          pgrep -fa qemu || echo "QEMU not running!"
          echo "=== VM log (last 80 lines) ==="
          tail -80 /tmp/debian/debian.log 2>/dev/null || echo "No VM log"
          echo "=== Port 2222 ==="
          ss -tlnp | grep 2222 || echo "Port 2222 not listening"
          exit 1

      - name: VM Deploy - Show system info
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'echo "System: $(. /etc/os-release && echo $NAME $VERSION)" && echo "Architecture: $(uname -m)"'

      - name: Check docker command
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'if command -v docker >/dev/null 2>&1; then
               echo "docker found: $(command -v docker)"
               docker --version
             else
               echo "docker NOT found"
             fi'

      - name: Install prerequisites
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'sudo apt update && sudo apt install -y curl gpg apt-transport-https ca-certificates'

      - name: Install via install script
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'curl -fsSL https://devstar.cn/install -o install.sh && bash install.sh'

      - name: docker ps (after install)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: devstar start
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            '. ~/.profile && sudo env "PATH=$PATH" devstar start'

      - name: docker ps (after start)
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost \
            'docker ps'

      - name: Shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
            -p 2222 tester@localhost 'sudo poweroff' 2>/dev/null || true
