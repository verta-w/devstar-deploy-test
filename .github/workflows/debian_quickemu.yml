name: Debian Quickemu

on:
  workflow_dispatch:

jobs:
  debian-quickemu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qemu-system-x86 ovmf qemu-utils cloud-image-utils openssh-client wget

      - name: Install Quickemu
        run: |
          # Try PPA first, then GitHub releases as fallback
          if sudo apt-add-repository -y ppa:flexiondotorg/quickemu 2>/dev/null; then
            sudo apt update && sudo apt install -y quickemu
          else
            wget -q "https://github.com/quickemu-project/quickemu/releases/download/4.9.7/quickemu_4.9.7-1_all.deb" -O /tmp/quickemu.deb
            sudo apt install -y /tmp/quickemu.deb
          fi
          echo "=== Quickemu version ==="
          quickemu --version 2>/dev/null || dpkg -l quickemu | grep quickemu

      - name: Generate SSH key
        run: ssh-keygen -t ed25519 -f ~/.ssh/id_qemu -N "" -q

      - name: Download Debian cloud image
        run: |
          mkdir -p /tmp/debian-vm
          wget -q --show-progress -O /tmp/debian-vm/disk.qcow2 \
            https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2

      - name: Create cloud-init seed
        run: |
          cat > /tmp/user-data << 'EOF'
          #cloud-config
          users:
            - name: tester
              sudo: ALL=(ALL) NOPASSWD:ALL
              lock_passwd: true
              ssh_authorized_keys:
                - __KEY__
          EOF
          sed -i "s|__KEY__|$(cat ~/.ssh/id_qemu.pub)|" /tmp/user-data
          echo -e "instance-id: debian-quickemu\nlocal-hostname: debian-quickemu" > /tmp/meta-data
          cloud-localds /tmp/debian-vm/seed.img /tmp/user-data /tmp/meta-data

      - name: Create Quickemu configuration
        run: |
          cat > /tmp/debian-vm.conf << 'CONF'
          # Quickemu VM configuration for Debian
          # Reference: https://github.com/quickemu-project/quickemu/wiki/02-Create-Linux-virtual-machines
          guest_os="linux"
          boot="efi"
          disk_img="/tmp/debian-vm/disk.qcow2"
          tpm="off"
          secureboot="off"
          network="user"
          ssh_port="2222"
          display="none"
          viewer="none"
          extra_args="-drive file=/tmp/debian-vm/seed.img,format=raw,if=virtio -serial file:/tmp/debian-vm/serial.log"
          CONF
          echo "=== Quickemu configuration ==="
          cat /tmp/debian-vm.conf

      - name: Boot VM with Quickemu
        run: |
          unset DISPLAY WAYLAND_DISPLAY
          quickemu --vm /tmp/debian-vm.conf &
          VM_PID=$!
          echo "VM PID: $VM_PID"
          sleep 5
          if ! kill -0 $VM_PID 2>/dev/null; then
            echo "VM failed to start!"
            echo "=== Serial log ==="
            cat /tmp/debian-vm/serial.log 2>/dev/null || true
            exit 1
          fi
          echo "VM is running (PID: $VM_PID)"

      - name: Wait for SSH
        run: |
          for i in $(seq 1 90); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
              -p 2222 tester@localhost 'exit' 2>/dev/null; then
              echo "SSH ready ($((i*5))s)"
              exit 0
            fi
            sleep 5
          done
          echo "=== SSH timeout - debugging ==="
          echo "--- Port 2222 ---"
          ss -tlnp | grep 2222 || echo "Port 2222 not listening"
          echo "--- QEMU process ---"
          pgrep -fa qemu || echo "QEMU not running!"
          echo "--- Serial log (last 40 lines) ---"
          tail -40 /tmp/debian-vm/serial.log 2>/dev/null || echo "No serial log"
          exit 1

      - name: Print architecture and system info
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_qemu -p 2222 tester@localhost '
            echo "========================================="
            echo "  System Information"
            echo "========================================="
            echo "OS:       $(. /etc/os-release && echo $NAME $VERSION)"
            echo "Kernel:   $(uname -r)"
            echo "Architecture: $(uname -m)"
            echo "Hostname: $(hostname)"
            echo "CPU:      $(nproc) cores"
            echo "Memory:   $(free -h | awk "/^Mem:/{print \$2}")"
            echo "Disk:     $(lsblk -d -o NAME,SIZE | tail -n +2)"
            echo "========================================="
            '

      - name: Shutdown VM
        if: always()
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
            -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_qemu \
            -p 2222 tester@localhost 'sudo poweroff' 2>/dev/null || true
